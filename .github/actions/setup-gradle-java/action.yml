name: Setup Java and Gradle

description: Sets up Temurin JDK 21, configures Gradle caching, and prepares gradlew.

inputs:
  show-toolchains:
    description: Run ./gradlew -q javaToolchains for diagnostics
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: "21"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew

    - name: Show resolved Java toolchains
      if: ${{ inputs.show-toolchains == 'true' }}
      shell: bash
      run: ./gradlew -q javaToolchains

